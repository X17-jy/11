<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>课程详情 · DataInsight</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

  <header class="site-header">
    <div class="container nav-container">
      <a href="/" class="logo">
        <span class="logo-mark">D</span>
        <span class="logo-text">DataInsight</span>
        <span class="logo-sub">商务数据分析教育平台</span>
      </a>
      <nav class="main-nav">
        <a href="/" class="nav-link">首页</a>
        <a href="/courses.html" class="nav-link active">课程</a>
        <a href="/projects.html" class="nav-link">项目</a>
      </nav>
    </div>
  </header>

  <main class="site-main">
    <div class="container">
      <a href="/courses.html" class="back-link">← 返回课程列表</a>
      <div id="course-detail">
        <div class="loading">加载中...</div>
      </div>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container footer-content">
      <div class="footer-logo">DataInsight</div>
      <div class="footer-desc">商务数据分析在线教育平台</div>
    </div>
  </footer>

  <script>
    async function loadCourseDetail() {
      const params = new URLSearchParams(window.location.search);
      const id = params.get('id');
      if (!id) {
        document.getElementById('course-detail').innerHTML = '<div class="error">课程 ID 缺失</div>';
        return;
      }

      try {
        const res = await fetch('/api/courses/' + id);
        if (res.status === 404) {
          document.getElementById('course-detail').innerHTML = '<div class="error">课程不存在</div>';
          return;
        }
        const json = await res.json();
        if (!json.success) return;
        const c = json.data;

        document.title = c.name + ' · DataInsight';
        document.getElementById('course-detail').innerHTML = `
          <div class="detail-header">
            <div class="detail-meta">
              <span class="course-category">${c.category}</span>
              <span class="course-level">${c.level}</span>
              <span class="course-duration">⏱ ${c.duration}</span>
            </div>
            <h1 class="detail-title">${c.name}</h1>
            <p class="detail-summary">${c.summary}</p>
          </div>

          <div class="detail-section">
            <h2 class="detail-section-title">🎯 学习目标</h2>
            <ul class="detail-list">
              ${c.objectives.map(o => '<li>' + o + '</li>').join('')}
            </ul>
          </div>

          <div class="detail-section">
            <h2 class="detail-section-title">📚 课程大纲</h2>
            <ol class="detail-list">
              ${c.chapters.map(ch => '<li>' + ch + '</li>').join('')}
            </ol>
          </div>

          <div class="detail-section">
            <h2 class="detail-section-title">👥 适合人群</h2>
            <ul class="detail-list">
              ${c.audience.map(a => '<li>' + a + '</li>').join('')}
            </ul>
          </div>

          <div class="detail-section">
            <h2 class="detail-section-title">🏆 学习收获</h2>
            <ul class="detail-list">
              ${c.outcomes.map(o => '<li>' + o + '</li>').join('')}
            </ul>
          </div>

          <div class="detail-actions">
            <a href="/pandas.html" class="btn btn-primary">开始相关练习 →</a>
          </div>
        `;
      } catch (err) {
        console.error('加载课程详情失败:', err);
        document.getElementById('course-detail').innerHTML = '<div class="error">加载失败</div>';
      }
    }

    loadCourseDetail();
  </script>

</body>
</html>
