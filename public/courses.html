<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>课程 · DataInsight 商务数据分析教育平台</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E📚%3C/text%3E%3C/svg%3E">
</head>
<body>

  <header class="site-header">
    <div class="container nav-container">
      <a href="/" class="logo">
        <span class="logo-mark">D</span>
        <span class="logo-text">DataInsight</span>
        <span class="logo-sub">商务数据分析教育平台</span>
      </a>
      <nav class="main-nav">
        <a href="/" class="nav-link">首页</a>
        <a href="/courses.html" class="nav-link active">课程</a>
        <a href="/projects.html" class="nav-link">项目</a>
      </nav>
    </div>
  </header>

  <main class="site-main">
    <section class="page-header">
      <div class="container">
        <span class="banner-eyebrow">COURSES</span>
        <h1 class="page-title">精选课程</h1>
        <p class="page-subtitle">从 Pandas 基础到商务分析实战，构建完整的数据分析能力体系</p>
      </div>
    </section>

    <section class="courses-section">
      <div class="container">
        <div class="filter-bar">
          <button class="filter-btn active" data-level="all">全部</button>
          <button class="filter-btn" data-level="入门">入门</button>
          <button class="filter-btn" data-level="进阶">进阶</button>
        </div>
        <div class="courses-grid" id="courses-grid">
          <div class="loading">加载中...</div>
        </div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container footer-content">
      <div class="footer-logo">DataInsight</div>
      <div class="footer-desc">商务数据分析在线教育平台 · 用数据驱动商业决策</div>
    </div>
  </footer>

  <script>
    let allCourses = [];

    async function loadCourses() {
      try {
        const res = await fetch('/api/courses');
        const json = await res.json();
        if (!json.success) return;
        allCourses = json.data;
        renderCourses(allCourses);
      } catch (err) {
        console.error('加载课程失败:', err);
        document.getElementById('courses-grid').innerHTML = '<div class="error">加载失败，请刷新重试</div>';
      }
    }

    function renderCourses(courses) {
      const grid = document.getElementById('courses-grid');
      if (courses.length === 0) {
        grid.innerHTML = '<div class="empty">暂无课程</div>';
        return;
      }
      grid.innerHTML = courses.map(c => `
        <a href="/course.html?id=${c.id}" class="course-card">
          <div class="course-image">${getCategoryIcon(c.category)}</div>
          <div class="course-content">
            <div class="course-meta-top">
              <span class="course-category">${c.category}</span>
              <span class="course-level">${c.level}</span>
            </div>
            <h3 class="course-title">${c.name}</h3>
            <p class="course-desc">${c.summary}</p>
            <div class="course-footer">
              <span class="course-duration">⏱ ${c.duration}</span>
              <span class="course-link">查看详情 →</span>
            </div>
          </div>
        </a>
      `).join('');
    }

    function getCategoryIcon(category) {
      const icons = {
        'Pandas': '📊',
        '数据可视化': '📈',
        '商务数据分析': '💼',
        'SQL': '🗄️'
      };
      return icons[category] || '📚';
    }

    // 筛选
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const level = btn.dataset.level;
        if (level === 'all') {
          renderCourses(allCourses);
        } else {
          renderCourses(allCourses.filter(c => c.level === level));
        }
      });
    });

    loadCourses();
  </script>

</body>
</html>
