<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>项目详情 · DataInsight</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

  <header class="site-header">
    <div class="container nav-container">
      <a href="/" class="logo">
        <span class="logo-mark">D</span>
        <span class="logo-text">DataInsight</span>
        <span class="logo-sub">商务数据分析教育平台</span>
      </a>
      <nav class="main-nav">
        <a href="/" class="nav-link">首页</a>
        <a href="/courses.html" class="nav-link">课程</a>
        <a href="/projects.html" class="nav-link active">项目</a>
      </nav>
    </div>
  </header>

  <main class="site-main">
    <div class="container">
      <a href="/projects.html" class="back-link">← 返回项目列表</a>
      <div id="project-detail">
        <div class="loading">加载中...</div>
      </div>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container footer-content">
      <div class="footer-logo">DataInsight</div>
      <div class="footer-desc">商务数据分析在线教育平台</div>
    </div>
  </footer>

  <script>
    async function loadProjectDetail() {
      const params = new URLSearchParams(window.location.search);
      const id = params.get('id');
      if (!id) {
        document.getElementById('project-detail').innerHTML = '<div class="error">项目 ID 缺失</div>';
        return;
      }

      try {
        const res = await fetch('/api/projects/' + id);
        if (res.status === 404) {
          document.getElementById('project-detail').innerHTML = '<div class="error">项目不存在</div>';
          return;
        }
        const json = await res.json();
        if (!json.success) return;
        const p = json.data;

        document.title = p.name + ' · DataInsight';
        document.getElementById('project-detail').innerHTML = `
          <div class="detail-header">
            <div class="detail-meta">
              <span class="project-industry">${p.industry}</span>
              <span class="project-level">${p.level}</span>
              <span class="project-scale">📊 ${p.scale}</span>
            </div>
            <h1 class="detail-title">${p.name}</h1>
            <p class="detail-summary">${p.summary}</p>
          </div>

          <div class="detail-section">
            <h2 class="detail-section-title">📋 项目说明</h2>
            <p class="detail-paragraph">${p.description}</p>
          </div>

          <div class="detail-section">
            <h2 class="detail-section-title">🎯 学习目标</h2>
            <ul class="detail-list">
              ${p.objectives.map(o => '<li>' + o + '</li>').join('')}
            </ul>
          </div>

          <div class="detail-section">
            <h2 class="detail-section-title">💾 数据集介绍</h2>
            <div class="dataset-info">
              <div class="dataset-row">
                <span class="dataset-label">数据来源：</span>
                <span class="dataset-value">${p.dataset.source}</span>
              </div>
              <div class="dataset-row">
                <span class="dataset-label">数据规模：</span>
                <span class="dataset-value">${p.dataset.scale}</span>
              </div>
              <div class="dataset-fields">
                <div class="dataset-label">字段说明：</div>
                <ul class="detail-list">
                  ${p.dataset.fields.map(f => '<li>' + f + '</li>').join('')}
                </ul>
              </div>
            </div>
          </div>

          <div class="detail-section">
            <h2 class="detail-section-title">📝 任务描述</h2>
            <ol class="detail-list">
              ${p.tasks.map(t => '<li>' + t + '</li>').join('')}
            </ol>
          </div>

          <div class="detail-actions">
            <a href="/pandas.html" class="btn btn-primary">开始练习相关技能 →</a>
          </div>
        `;
      } catch (err) {
        console.error('加载项目详情失败:', err);
        document.getElementById('project-detail').innerHTML = '<div class="error">加载失败</div>';
      }
    }

    loadProjectDetail();
  </script>

</body>
</html>
